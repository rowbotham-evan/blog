    <h1>Ion Transport in a Two-Compartment Model</h1>
    <p class="date">February 24, 2026</p>

    <p>
      For two well-mixed compartments, conservation gives
      $\frac{dC_i}{dt} = -\frac{J A}{V_i}$ and
      $\frac{dC_e}{dt} = \frac{J A}{V_e}$,
      where $J$ is transmembrane flux density.
    </p>
