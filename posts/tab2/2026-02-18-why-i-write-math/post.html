    <h1>Why I Write Mathematics by Hand</h1>
    <p class="date">February 18, 2026</p>

    <p>
      Handwritten derivations force slower reasoning and reveal hidden assumptions.
      For quick checks, I keep compact identities nearby, such as
      $\phi = \frac{RT}{F}\ln\frac{[Na]_e}{[Na]_i}$.
    </p>
